version: '3.8'
services:
  points-system:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./server/uploads:/app/uploads
    environment:
      - PORT=3000
      - JWT_SECRET=change-this-to-a-random-secret-key
      - DB_PATH=/app/data/points.db
    restart: unless-stopped
