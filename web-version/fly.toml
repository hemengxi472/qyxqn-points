app = "qyxqn-points"
primary_region = "nrt"

[build]
  image = "node:20-alpine"

[env]
  PORT = "3000"
  DB_PATH = "/app/data/points.db"

[[mounts]]
  source = "data"
  destination = "/app/data"

[[mounts]]
  source = "uploads"
  destination = "/app/uploads"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
